<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas | DevSolutions</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        /* Estilos adicionales específicos para la lista de tareas dinámicas */
        .lista-tareas {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
        }
        .item-tarea {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
            color: #333;
        }
        .boton-eliminar {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .boton-eliminar:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Gestión de Tareas</h1>
        <p class="subtitulo">Organiza tus pendientes. Los datos persistirán en el navegador.</p>

        <form class="formulario" id="formTareas" onsubmit="event.preventDefault();">
            <div class="grupo-formulario">
                <label for="nuevaTareaInput">Nueva Tarea</label>
                <input type="text" id="nuevaTareaInput" placeholder="Ej: Estudiar JavaScript para el examen" required>
                <span class="error" id="errorTarea"></span>
            </div>

            <button type="button" id="btnAgregarTarea" class="boton-enviar">
                Agregar Tarea <span>&rarr;</span>
            </button>

            <div class="grupo-formulario" style="margin-top: 25px;">
                <label>Mis Pendientes</label>
                <ul id="listaTareas" class="lista-tareas">
                    </ul>
            </div>
        </form>
    </div>

    <script src="js/ejercicio17.js"></script>
</body>
</html>
