<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones con Arreglos | DevSolutions</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Operaciones con Arreglos</h1>
        <p class="subtitulo">Ingresa números separados por comas para calcular estadísticas.</p>

        <form class="formulario" id="formArreglos">
            <div class="grupo-formulario">
                <label for="numerosInput">Números separados por comas</label>
                <input type="text" id="numerosInput" placeholder="Ej: 10, 20, 30, 40, 50" required>
                <span class="error" id="errorNumeros"></span>
            </div>

            <button type="button" id="btnCalcular" class="boton-enviar">
                Calcular <span>&rarr;</span>
            </button>

            <div class="grupo-formulario">
                <label for="numMayor">Número Mayor</label>
                <input type="text" id="numMayor" readonly placeholder="Mayor aparece aquí...">
            </div>

            <div class="grupo-formulario">
                <label for="numMenor">Número Menor</label>
                <input type="text" id="numMenor" readonly placeholder="Menor aparece aquí...">
            </div>

            <div class="grupo-formulario">
                <label for="promedio">Promedio</label>
                <input type="text" id="promedio" readonly placeholder="Promedio aparece aquí...">
            </div>
        </form>
    </div>

    <script src="js/ejercicio14.js"></script>
</body>
</html>
