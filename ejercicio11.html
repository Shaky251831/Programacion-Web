<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor | DevSolutions</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-formulario">
        <h1>Conversor A Distancia</h1>
        <p class="subtitulo">Convierte Kilometros a Millas.</p>

        <form class="formulario" id="formConversor">
        <!-- Kilometros -->
            <div class="grupo-formulario">
                <label for="kilometros">Distancia en Kilometros</label>
                <input type="text" id="kilometros" placeholder="Ej: 10" required>
                <span class="error" id="errorKilometros"></span>
            </div>

       <!-- Botón -->
            <button type="button" id="btnConvertir" class="boton-enviar">
                Convertir <span>&rarr;</span>
            </button>

       <!-- Resultado -->
            <div class="grupo-formulario">
                <label for="millas">Resultado en Millas</label>
                <input type="text" id="millas" readonly>
            </div>
        </form>
    </div>

    <script src="js/ejercicio11.js"></script>
</body>
</html>
