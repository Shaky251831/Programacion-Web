<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Validación Segura</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="container">
        <h2>Iniciar Sesión</h2>
        <form id="formLogin">
            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" required>
                <small>Debe tener 8+ caracteres, incluir mayúscula, minúscula, número y carácter especial.</small>
            </div>

            <button type="submit">Ingresar</button>
        </form>
    </div>

    <script src="js/utileria.js"></script>
    <script>
        document.getElementById('formLogin').addEventListener('submit', function(e) {
            e.preventDefault();

            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;

            console.log("========== EVALUANDO LOGIN ==========");
            console.log("Correo evaluado:", correo);
            console.log("¿Formatos de correo válido?:", validarCorreo(correo));
            console.log("¿Contraseña cumple requisitos de seguridad?:", validarPassword(password));

            if (!validarCorreo(correo)) {
                alert("Por favor, introduce un correo electrónico válido.");
                console.error("Login Denegado: Formato de correo inválido.");
                return;
            }

            if (!validarPassword(password)) {
                alert("La contraseña no cumple con los requisitos mínimos de seguridad.");
                console.error("Login Denegado: Contraseña insegura.");
                return;
            }

            console.log("¡ACCESO OTORGADO! Las credenciales cumplen los formatos.");
            console.log("=====================================");
            alert("¡Validaciones correctas! Iniciando sesión...");
        });
    </script>
</body>
</html>
