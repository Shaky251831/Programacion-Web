<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulación del DOM | DevSolutions</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Personalización de colores de la marca DevSolutions sobre Bootstrap */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .btn-devsolutions {
            background-color: #927bc0;
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-devsolutions:hover {
            background-color: #7c62ab;
            color: white;
        }
        .text-devsolutions {
            color: #927bc0;
        }
        /* Estilos para enfocar inputs de Bootstrap al estilo morado */
        .form-control:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 0.25rem rgba(167, 139, 250, 0.25);
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <div class="card-body">
                        <h1 class="card-title text-devsolutions h3 mb-1 fw-bold">Agregar y Eliminar Elementos</h1>
                        <p class="text-muted small mb-4">Escribe un elemento para construir una lista dinámica interactiva utilizando el DOM.</p>

                        <div class="input-group mb-4">
                            <input type="text" id="nuevoElemento" class="form-control p-2.5" placeholder="Escribe algo para agregar..." aria-label="Nuevo elemento">
                            <button class="btn btn-devsolutions px-4" id="agregarBtn">Agregar</button>
                        </div>

                        <div>
                            <label class="form-label fw-semibold text-secondary mb-2">Mi Lista Dinámica</label>
                            <ul id="lista" class="list-group">
                                </ul>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
